document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

x;align-items:center;gap:8px;font-size:14px;font-weight:600;color:oklch(48% 0.08 230);cursor:pointer;min-height:44px;padding:6px 4px\">\n          <span style=\"font-size:16px\">←<\u002Fspan> Accueil\n        <\u002Fdiv>\n        <div role=\"button\" tabindex=\"0\" onclick=\"{{ toggleSources }}\" onkeydown=\"{{ toggleSourcesKey }}\" style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:rgba(40,30,20,.55);border:1.5px solid rgba(40,30,20,.18);border-radius:9px;padding:8px 14px;cursor:pointer;min-height:44px;box-sizing:border-box\">\n          <span style=\"width:15px;height:15px;border-radius:50%;border:1.5px solid currentColor;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800\">i<\u002Fspan> Sources\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ sourcesOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;top:70px;right:40px;width:300px;background:#fff;border-radius:12px;box-shadow:0 8px 28px rgba(40,30,20,.18);padding:18px 20px;z-index:5\">\n          <div style=\"font-weight:700;font-size:14px;margin-bottom:10px\">Sources<\u002Fdiv>\n          <div style=\"font-size:12.5px;line-height:1.6;opacity:.75\">Haute Autorité de Santé — Arrêt de la consommation de tabac (2014).<br>Tabac Info Service — 39 89.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"font-family:'Source Serif 4',serif;font-weight:600;font-size:26px;margin-bottom:6px\">La nicotine : cinétique &amp; seuils<\u002Fdiv>\n      <div style=\"font-size:15px;opacity:.65;margin-bottom:22px;max-width:64ch\">Choisissez un outil, puis cliquez sur la frise pour placer un événement à cet instant. Observez comment le taux de nicotine traverse les trois zones.<\u002Fdiv>\n\n      <div style=\"display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap\">\n        <div role=\"button\" tabindex=\"0\" onclick=\"{{ setToolCigarette }}\" style=\"{{ cigButtonStyle }}\">\n x1=\"20\" y1=\"196\" x2=\"620\" y2=\"196\" stroke=\"rgba(40,30,20,.3)\" stroke-width=\"1.5\" stroke-dasharray=\"5 5\" style=\"pointer-events:none\"><\u002Fline>\n\n          <sc-for list=\"{{ events }}\" as=\"ev\" hint-placeholder-count=\"0\">\n            <line x1=\"{{ ev.x }}\" y1=\"20\" x2=\"{{ ev.x }}\" y2=\"222\" stroke=\"{{ ev.color }}\" stroke-width=\"1.5\" stroke-dasharray=\"3 3\" opacity=\".4\" style=\"pointer-events:none\"><\u002Fline>\n          <\u002Fsc-for>\n\n          <path d=\"{{ curvePath }}\" fill=\"none\" stroke=\"oklch(30% 0.02 50)\" stroke-width=\"4\" stroke-linecap=\"round\" style=\"pointer-events:none\"><\u002Fpath>\n\n          <text x=\"28\" y=\"41\" font-family=\"Work Sans\" font-weight=\"800\" font-size=\"12\" fill=\"oklch(45% 0.13 30)\" stroke=\"oklch(97% 0.015 75)\" stroke-width=\"4\" paint-order=\"stroke\" style=\"pointer-events:none\">SURDOSAGE<\u002Ftext>\n          <text x=\"28\" y=\"130\" font-family=\"Work Sans\" font-weight=\"800\" font-size=\"12\" fill=\"oklch(40% 0.09 145)\" stroke=\"oklch(97% 0.015 75)\" stroke-width=\"4\" paint-order=\"stroke\" style=\"pointer-events:none\">ZONE DE CONFORT<\u002Ftext>\n          <text x=\"28\" y=\"212\" font-family=\"Work Sans\" font-weight=\"800\" font-size=\"12\" fill=\"oklch(38% 0.02 50)\" stroke=\"oklch(97% 0.015 75)\" stroke-width=\"4\" paint-order=\"stroke\" style=\"pointer-events:none\">MANQUE<\u002Ftext>\n\n          <sc-for list=\"{{ events }}\" as=\"ev\" hint-placeholder-count=\"0\">\n            <sc-if value=\"{{ ev.isPatch }}\" hint-placeholder-val=\"{{ false }}\">\n              <g onclick=\"{{ ev.remove }}\" style=\"cursor:pointer\">\n                <sc-for list=\"{{ ev.cells }}\" as=\"cell\" hint-placeholder-count=\"0\">\n                  <rect x=\"{{ cell.x }}\" y=\"{{ cell.y }}\" width=\"{{ cell.w }}\" height=\"{{ cell.h }}\" fill=\"{{ cell.fill }}\" stroke=\"{{ cell.stroke }}\" stroke-width=\"{{ cell.sw }}\" rx=\"1\"><\u002Frect>\n                <\u002Fsc-for>\n              <\u002Fg>\n              <text x=\"{{ ev.x }}\" y=\"215\" text-anchor=\"middle\" font-family=\"Work Sans\" font-weight=\"700\" font-size=\"11\" fill=\"{{ ev.color }}\" style=\"pointer-events:none\">{{ ev.doseLabel }}<\u002Ftext>\n              <g onclick=\"{{ ev.decDose }}\" style=\"cursor:pointer\">\n                <circle cx=\"{{ ev.xMinus }}\" cy=\"236\" r=\"10\" fill=\"#fff\" stroke=\"{{ ev.color }}\" stroke-width=\"1.5\"><\u002Fcircle>\n                <text x=\"{{ ev.xMinus }}\" y=\"240\" text-anchor=\"middle\" font-family=\"Work Sans\" font-weight=\"800\" font-size=\"14\" fill=\"{{ ev.color }}\" style=\"pointer-events:none\">−<\u002Ftext>\n              <\u002Fg>\n              <g onclick=\"{{ ev.incDose }}\" style=\"cursor:pointer\">\n                <circle cx=\"{{ ev.xPlus }}\" cy=\"236\" r=\"10\" fill=\"#fff\" stroke=\"{{ ev.color }}\" stroke-width=\"1.5\"><\u002Fcircle>\n                <text x=\"{{ ev.xPlus }}\" y=\"240\" text-anchor=\"middle\" font-family=\"Work Sans\" font-weight=\"800\" font-size=\"14\" fill=\"{{ ev.color }}\" style=\"pointer-events:none\">+<\u002Ftext>\n              <\u002Fg>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ ev.isCigarette }}\" hint-placeholder-val=\"{{ false }}\">\n              <g onclick=\"{{ ev.remove }}\" style=\"cursor:pointer\">\n                <circle cx=\"{{ ev.x }}\" cy=\"236\" r=\"13\" fill=\"{{ ev.color }}\"><\u002Fcircle>\n                <text x=\"{{ ev.x }}\" y=\"240.5\" text-anchor=\"middle\" font-size=\"12\" fill=\"#fff\" style=\"pointer-events:none\">🚬<\u002Ftext>\n              <\u002Fg>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ ev.isSubstitut }}\" hint-placeholder-val=\"{{ false }}\">\n              <g onclick=\"{{ ev.remove }}\" style=\"cursor:pointer\">\n                <circle cx=\"{{ ev.x }}\" cy=\"236\" r=\"13\" fill=\"{{ ev.color }}\"><\u002Fcircle>\n                <text x=\"{{ ev.x }}\" y=\"240.5\" text-anchor=\"middle\" font-family=\"Work Sans\" font-weight v>\n\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isSoulagement }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Module - Le piege du soulagement\" style=\"max-width:980px;margin:0 auto;padding:32px 40px 60px;position:relative\">\n\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:22px\">\n        <div role=\"button\" tabindex=\"0\" onclick=\"{{ goHome }}\" onkeydown=\"{{ goHomeKey }}\" style=\"display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:oklch(48% 0.08 230);cursor:pointer;min-height:44px;padding:6px 4px\">\n          <span style=\"font-size:16px\">←<\u002Fspan> Accueil\n        <\u002Fdiv>\n        <div role=\"button\" tabindex=\"0\" onclick=\"{{ toggleSources }}\" onkeydown=\"{{ toggleSourcesKey }}\" style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:rgba(40,30,20,.55);border:1.5px solid rgba(40,30,20,.18);border-radius:9px;padding:8px 14px;cursor:pointer;min-height:44px;box-sizing:border-box\">\n          <span style=\"width:15px;height:15px;border-radius:50%;border:1.5px solid currentColor;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800\">i<\u002Fspan> Sources\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ sourcesOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;top:70px;right:40px;width:300px;background:#fff;border-radius:12px;box-shadow:0 8px 28px rgba(40,30,20,.18);padding:18px 20px;z-index:5\">\n          <div style=\"font-weight:700;font-size:14px;margin-bottom:10px\">Sources<\u002Fdiv>\n          <div style=\"font-size:12.5px;line-height:1.6;opacity:.75\">Haute Autorité de Santé — Arrêt de la consommation de tabac (2014).<br>Tabac Info Service — 39 89.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"font-family:'Source Serif 4',serif;font-weight:600;font-size:26px;margin-bottom:6px\">Le piège du soulagement<\u002Fdiv>\n      <div style=\"font-size:15px;opacity:.65;margin-bottom:16px;max-width:64ch\">Cliquez sur la frise pour « fumer une cigarette » et observez le niveau de stress. Il chute au moment précis — c'est le soulagement — puis remonte progressivement.<\u002Fdiv>\n\n      <div style=\"background:oklch(65% 0.13 80 / .14);border-left:4px solid oklch(65% 0.13 80);border-radius:10px;padding:14px 18px;margin-bottom:18px;font-size:13.5px;line-height:1.5\"><b>Lecture en 2 temps :<\u002Fb> la chute au clic = le soulagement ressenti. La remontée qui suit = le retour du manque, plus vite qu'on ne le croit. Ce n'est pas un plaisir gagné : c'est un retour à zéro, temporaire.<\u002Fdiv>\n\n      <div style=\"background:#fff;border-radius:16px;padding:24px 26px 18px;box-shadow:0 1px 3px rgba(60,40,20,.08)\">\n        <svg ref=\"{{ soulagementSvgRef }}\" viewBox=\"0 0 640 246\" onclick=\"{{ addSoulagementEventAtClick }}\" style=\"display:block;width:100%;height:auto;cursor:crosshair\">\n          <text x=\"20\" y=\"24\" font-family=\"Work Sans\" font-weight=\"700\" font-size=\"12\" fill=\"rgba(40,30,20,.45)\">niveau de stress ↑<\u002Ftext>\n\n          <path d=\"{{ soulagementCurvePath }}\" fill=\"none\" stroke=\"oklch(55% 0.15 30)\" stroke-width=\"4\" stroke-linecap=\"round\" style=\"pointer-events:none\"><\u002Fpath>\n\n          <sc-if value=\"{{ showNonSmoker }}\" hint-placeholder-val=\"{{ false }}\">\n            <line x1=\"20\" y1=\"{{ nonSmokerY }}\" x2=\"620\" y2=\"{{ nonSmokerY }}\" stroke=\"oklch(58% 0.09 145)\" stroke-width=\"2.5\" stroke-dasharray=\"6 5\" style=\"pointer-events:none\"><\u002Fline>\n            <text x=\"24\" y=\"{{ nonSmokerLabelY }}\" font-family=\"Work Sans\" font-weight=\"800\" font-size=\"12\" fill=\"oklch(38% 0.09 145)\" style=\"pointer-events:none\">Niveau d'un non-fumeur<\u002Ftext>\n          <\u002Fsc-if>\n\n          <sc-for list=\"{{ soulagementEvents }}\" as=\"ev\" hint-placeholder-count=\"0\">\n            <g onclick=\"{{ ev.remove }}\" style=\"cursor:pointer\">\n              <circle cx=\"{{ ev.x }}\" cy=\"206\" r=\"13\" fill=\"oklch(55% 0.15 30)\"><\u002Fcircle>\n              <text x=\"{{ ev.x }}\" y=\"210.5\" text-anchor=\"middle\" font-size=\"12\" fill=\"#fff\" style=\"pointer-events:none\">🚬<\u002Ftext>\n            <\u002Fg>\n          <\u002Fsc-for>\n\n          <text x=\"20\" y=\"238\" font-family=\"Work Sans\" font-weight=\"600\" font-size=\"11\" fill=\"rgba(40,30,20,.5)\">0h<\u002Ftext>\n          <text x=\"158\" y=\"238\" font-family=\"Work Sans\" font-weight=\"600\" font-size=\"11\" fill=\"rgba(40,30,20,.5)\">6h<\u002Ftext>\n          <text x=\"311\" y=\"238\" font-family=\"Work Sans\" font-weight=\"600\" font-size=\"11\" fill=\"rgba(40,30,20,.5)\">12h<\u002Ftext>\n          <text x=\"461\" y=\"238\" font-family=\"Work Sans\" font-weight=\"600\" font-size=\"11\" fill=\"rgba(40,30,20,.5)\">18h<\u002Ftext>\n          <text x=\"605\" y=\"238\" font-family=\"Work Sans\" font-weight=\"600\" font-size=\"11\" fill=\"rgba(40,30,20,.5)\">24h<\u002Ftext>\n        <\u002Fsvg>\n        <div style=\"font-size:12px;opacity:.4;font-weight:600;text-align:center;margin-top:2px\">Cliquez sur la frise pour ajouter une cigarette · cliquez un repère pour le retirer<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;justify-content:center;align-items:center;gap:10px;margin-top:18px;flex-wrap:wrap\">\n        <div role=\"button\" tabindex=\"0\" onclick=\"{{ toggleNonSmoker }}\" style=\"{{ nonSmokerButtonStyle }}\">{{ nonSmokerButtonLabel }}<\u002Fdiv>\n        <sc-if value=\"{{ hasSoulagementEvents }}\" hint-placeholder-val=\"{{ false }}\">\n          <div role=\"button\" tabindex=\"0\" onclick=\"{{ clearSoulagementEvents }}\" style=\"display:flex;align-items:center;padding:10px 16px;border-radius:10px;border:1.5px solid rgba(40,30,20,.18);font-weight:600;font-size:13px;color:rgba(40,30,20,.55);cursor:pointer;min-height:44px;box-sizing:border-box\">Réinitialiser<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ showNonSmoker }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:oklch(55% 0.15 30 / .1);border-radius:12px;padding:14px 18px;margin-top:16px;font-size:13.5px;line-height:1.5\">Même au plus bas de sa tension, le fumeur reste au-dessus du niveau qu'un non-fumeur a en permanence — ce n'est pas un plaisir gagné, juste un retour incomplet à la normale.<\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isToxique }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Module - La nicotine n'est pas le toxique\" style=\"max-width:980px;margin:0 auto;padding:32px 40px 60px;position:relative\">\n\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:22px\">\n        <div role=\"button\" tabindex=\"0\" onclick=\"{{ goHome }}\" onkeydown=\"{{ goHomeKey }}\" style=\"display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:oklch(48% 0.08 230);cursor:pointer;min-height:44px;padding:6px 4px\">\n          <span style=\"font-size:16px\">←<\u002Fspan> Accueil\n        <\u002Fdiv>\n        <div role=\"button\" tabindex=\"0\" onclick=\"{{ toggleSources }}\" onkeydown=\"{{ toggleSourcesKey }}\" style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:rgba(40,30,20,.55);border:1.5px solid rgba(40,30,20,.18);border-radius:9px;padding:8px 14px;cursor:pointer;min-height:44px;box-sizing:border-box\">\n          <span style=\"width:15px;height:15px;border-radius:50%;border:1.5px solid currentColor;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800\">i<\u002Fspan> Sources\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ sourcesOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;top:70px;right:40px;width:300px;background:#fff;border-radius:12px;box-shadow:0 8px 28px rgba(40,30,20,.18);padding:18px 20px;z-index:5\">\n          <div style=\"font-weight:700;font-size:14px;margin-bottom:10px\">Sources<\u002Fdiv>\n          <div style=\"font-size:12.5px;line-height:1.6;opacity:.75\">Haute Autorité de Santé — Arrêt de la consommation de tabac (2014).<br>Tabac Info Service — 39 89.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"font-family:'Source Serif 4',serif;font-weight:600;font-size:26px;margin-bottom:6px\">La nicotine n'est pas le toxique<\u002Fdiv>\n      <div style=\"font-size:15px;opacity:.65;margin-bottom:20px;max-width:64ch\">Chaque repère pointe l'origine réelle d'une substance. Cliquez un point pour en savoir plus, ou basculez la vue pour distinguer ce qui rend malade de ce qui crée la dépendance.<\u002Fdiv>\n\n      <div style=\"display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap\">\n        <div role=\"button\" tabindex=\"0\" onclick=\"{{ setViewMalade }}\" style=\"{{ maladeButtonStyle }}\">⚠️ Ce qui rend malade<\u002Fdiv>\n        <div role=\"button\" tabindex=\"0\" onclick=\"{{ setViewDependance }}\" style=\"{{ dependanceButtonStyle }}\">🧠 Ce qui crée la dépendance<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border-radius:16px;padding:20px 20px 18px;box-shadow:0 1px 3px rgba(60,40,20,.08);position:relative\">\n        <div style=\"position:relative;width:100%;padding-top:43.667%\">\n          <svg viewBox=\"0 0 600 262\" style=\"position:absolute;inset:0;width:100%;height:100%;display:block\">\n            <rect x=\"60\" y=\"114\" width=\"330\" height=\"34\" rx=\"6\" fill=\"oklch(88% 0.02 75)\" stroke=\"rgba(40,30,20,.25)\" stroke-width=\"1.5\"><\u002Frect>\n            <rect x=\"390\" y=\"114\" width=\"120\" height=\"34\" rx=\"6\" fill=\"oklch(78% 0.05 60)\" stroke=\"rgba(40,30,20,.25)\" stroke-width=\"1.5\"><\u002Frect>\n            <circle cx=\"55\" cy=\"131\" r=\"16\" fill=\"oklch(60% 0.16 45)\"><\u002Fcircle>\n            <text x=\"225\" y=\"135\" text-anchor=\"middle\" font-family=\"Work Sans\" font-weight=\"600\" font-size=\"11.5\" fill=\"rgba(40,30,20,.4)\">Combustion (papier + tabac)<\u002Ftext>\n            <text x=\"450\" y=\"135\" text-anchor=\"middle\" font-family=\"Work Sans\" font-weight=\"600\" font-size=\"11.5\" fill=\"rgba(40,30,20,.4)\">Filtre<\u002Ftext>\n\n            <sc-for list=\"{{ hotspots }}\" as=\"h\" hint-placeholder-count=\"4\">\n              <line x1=\"{{ h.x }}\" y1=\"{{ h.lineY1 }}\" x2=\"{{ h.x }}\" y2=\"{{ h.lineY2 }}\" stroke=\"{{ h.lineColor }}\" stroke-width=\"2\"><\u002Fline>\n              <circle cx=\"{{ h.x }}\" cy=\"{{ h.cy }}\" r=\"{{ h.r }}\" fill=\"{{ h.fill }}\" stroke=\"{{ h.color }}\" stroke-width=\"{{ h.strokeW }}\"><\u002Fcircle>\n            <\u002Fsc-for>\n          <\u002Fsvg>\n\n          <sc-for list=\"{{ hotspots }}\" as=\"h\" hint-placeholder-count=\"4\">\n            <div role=\"button\" tabindex=\"0\" onclick=\"{{ h.toggle }}\" style=\"{{ h.iconHtmlStyle }}\">{{ h.icon }}<\u002Fdiv>\n            <div onclick=\"{{ h.toggle }}\" style=\"{{ h.labelHtmlStyle }}\">{{ h.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n\n          <sc-if value=\"{{ hasOpenHotspot }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"{{ popoverStyle }}\">\n              <div style=\"font-weight:800;font-size:13.5px;margin-bottom:4px\">{{ openIcon }} {{ openLabel }}<\u002Fdiv>\n              <div style=\"font-size:12.5px;line-height:1.5;opacity:.8\">{{ openDetail }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;gap:14px;margin-top:18px;flex-wrap:wrap\">\n        <div style=\"flex:1;min-width:240px;background:oklch(55% 0.15 30 / .1);border-radius:12px;padding:14px 16px;font-size:13px;line-height:1.5\"><b style=\"display:block;margin-bottom:3px\">⚠️ Rend malade<\u002Fb>Vient de la combustion. Disparaît avec substituts/vapoteuse.<\u002Fdiv>\n        <div style=\"flex:1;min-width:240px;background:oklch(48% 0.08 230 / .1);border-radius:12px;padding:14px 16px;font-size:13px;line-height:1.5\"><b style=\"display:block;margin-bottom:3px\">🧠 Crée la dépendance<\u002Fb>La nicotine seule. Pas anodine, mais ne cause pas les maladies du tabac.<\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isMotivation }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Module - Explorer ma motivation\" style=\"max-width:980px;margin:0 auto;padding:32px 40px 60px;position:relative\">\n\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:22px\">\n        <div role=\"button\" tabindex=\"0\" onclick=\"{{ goHome }}\" onkeydown=\"{{ goHomeKey }}\" style=\"display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:oklch(48% 0.08 230);cursor:pointer;min-height:44px;padding:6px 4px\">\n          <span style=\"font-size:16px\">←<\u002Fspan> Accueil\n        <\u002Fdiv>\n        <div role=\"button\" tabindex=\"0\" onclick=\"{{ toggleSources }}\" onkeydown=\"{{ toggleSourcesKey }}\" style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:rgba(40,30,20,.55);border:1.5px solid rgba(40,30,20,.18);border-radius:9px;padding:8px 14px;cursor:pointer;min-height:44px;box-sizing:border-box\">\n          <span style=\"width:15px;height:15px;border-radius:50%;border:1.5px solid currentColor;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800\">i<\u002Fspan> Sources\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ sourcesOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;top:70px;right:40px;width:300px;background:#fff;border-radius:12px;box-shadow:0 8px 28px rgba(40,30,20,.18);padding:18px 20px;z-index:5\">\n          <div style=\"font-weight:700;font-size:14px;margin-bottom:10px\">Sources<\u002Fdiv>\n          <div style=\"font-size:12.5px;line-height:1.6;opacity:.75\">Haute Autorité de Santé — Arrêt de la consommation de tabac (2014).<br>Tabac Info Service — 39 89.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"font-family:'Source Serif 4',serif;font-weight:600;font-size:26px;margin-bottom:6px\">Explorer ma motivation<\u002Fdiv>\n      <div style=\"font-size:15px;opacity:.65;margin-bottom:20px;max-width:64ch\">À votre rythme, sans jugement. Pas de liste avantages/inconvénients ici.<\u002Fdiv>\n\n      <div style=\"display:flex;gap:8px;margin-bottom:24px\">\n        <div role=\"button\" tabindex=\"0\" onclick=\"{{ setTabEtat }}\" style=\"{{ tabEtatStyle }}\">Où en êtes-vous ?<\u002Fdiv>\n        <div role=\"button\" tabindex=\"0\" onclick=\"{{ setTabRaisons }}\" style=\"{{ tabRaisonsStyle }}\">Mes raisons<\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ isEtatTab }}\" hint-placeholder-val=\"{{ true }}\">\n\n        <sc-if value=\"{{ isStepImportance }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"max-width:480px;margin:20px auto 0;text-align:center;background:oklch(58% 0.09 145 / .12);border-radius:20px;padding:40px 32px\">\n            <div style=\"font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;opacity:.5;margin-bottom:14px\">Question 1 sur 2<\u002Fdiv>\n            <div style=\"font-weight:700;font-size:20px;line-height:1.3;margin-bottom:26px\">À quel point est-ce important pour vous d'arrêter ?<\u002Fdiv>\n            <svg ref=\"{{ importanceRef }}\" width=\"180\" height=\"180\" viewBox=\"0 0 120 120\" onpointerdown=\"{{ importanceDrag }}\" style=\"cursor:grab;touch-action:none;margin:0 auto;display:block\">\n              <circle cx=\"60\" cy=\"60\" r=\"48\" fill=\"none\" stroke=\"oklch(90% 0.02 145)\" stroke-width=\"12\" style=\"pointer-events:none\"><\u002Fcircle>\n              <circle cx=\"60\" cy=\"60\" r=\"48\" fill=\"none\" stroke=\"oklch(58% 0.09 145)\" stroke-width=\"12\" stroke-linecap=\"round\" stroke-dasharray=\"301.6\" stroke-dashoffset=\"{{ importanceOffset }}\" transform=\"rotate(-90 60 60)\" style=\"pointer-events:none\"><\u002Fcircle>\n              <text x=\"60\" y=\"70\" text-anchor=\"middle\" font-family=\"Work Sans\" font-weight=\"800\" font-size=\"34\" fill=\"oklch(38% 0.09 145)\" style=\"pointer-events:none\">{{ importance }}<\u002Ftext>\n            <\u002Fsvg>\n            <div style=\"font-size:12px;opacity:.45;font-weight:600;margin-top:10px\">Faites glisser autour du cercle<\u002Fdiv>\n            <sc-if value=\"{{ importanceTouched }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;flex-direction:column;gap:8px;margin-top:22px\">\n                <sc-if value=\"{{ importanceShowMinus }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"background:#fff;border-radius:9px;padding:12px 14px;font-size:13px;line-height:1.4\">Pourquoi pas <b>{{ importanceMinus }}<\u002Fb> plutôt que {{ importance }} ?<\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ importanceShowPlus }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"background:#fff;border-radius:9px;padding:12px 14px;font-size:13px;line-height:1.4\">Qu'est-ce qui aiderait à passer à <b>{{ importancePlus }}<\u002Fb> ?<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div role=\"button\" tabindex=\"0\" onclick=\"{{ goToStepConfidence }}\" style=\"display:inline-flex;align-items:center;gap:8px;margin-top:24px;background:oklch(58% 0.09 145);color:#fff;font-weight:700;font-size:14px;border-radius:10px;padding:12px 24px;cursor:pointer;min-height:44px;box-sizing:border-box\">Suivant →<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isStepConfidence }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"max-width:480px;margin:20px auto 0;text-align:center;background:oklch(48% 0.08 230 / .1);border-radius:20px;padding:40px 32px\">\n            <div style=\"font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;opacity:.5;margin-bottom:14px\">Question 2 sur 2<\u002Fdiv>\n            <div style=\"font-weight:700;font-size:20px;line-height:1.3;margin-bottom:26px\">À quel point vous sentez-vous capable / confiant(e) ?<\u002Fdiv>\n            <svg ref=\"{{ confidenceRef }}\" width=\"180\" height=\"180\" viewBox=\"0 0 120 120\" onpointerdown=\"{{ confidenceDrag }}\" style=\"cursor:grab;touch-action:none;margin:0 auto;display:block\">\n              <circle cx=\"60\" cy=\"60\" r=\"48\" fill=\"none\" stroke=\"oklch(92% 0.02 230)\" stroke-width=\"12\" style=\"pointer-events:none\"><\u002Fcircle>\n              <circle cx=\"60\" cy=\"60\" r=\"48\" fill=\"none\" stroke=\"oklch(48% 0.08 230)\" stroke-width=\"12\" stroke-linecap=\"round\" stroke-dasharray=\"301.6\" stroke-dashoffset=\"{{ confidenceOffset }}\" transform=\"rotate(-90 60 60)\" style=\"pointer-events:none\"><\u002Fcircle>\n              <text x=\"60\" y=\"70\" text-anchor=\"middle\" font-family=\"Work Sans\" font-weight=\"800\" font-size=\"34\" fill=\"oklch(35% 0.08 230)\" style=\"pointer-events:none\">{{ confidence }}<\u002Ftext>\n            <\u002Fsvg>\n            <div style=\"font-size:12px;opacity:.45;font-weight:600;margin-top:10px\">Faites glisser autour du cercle<\u002Fdiv>\n            <sc-if value=\"{{ confidenceTouched }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;flex-direction:column;gap:8px;margin-top:22px\">\n                <sc-if value=\"{{ confidenceShowMinus }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"background:#fff;border-radius:9px;padding:12px 14px;font-size:13px;line-height:1.4\">Pourquoi pas <b>{{ confidenceMinus }}<\u002Fb> plutôt que {{ confidence }} ?<\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ confidenceShowPlus }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"background:#fff;border-radius:9px;padding:12px 14px;font-size:13px;line-height:1.4\">Qu'est-ce qui aiderait à passer à <b>{{ confidencePlus }}<\u002Fb> ?<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div role=\"button\" tabindex=\"0\" onclick=\"{{ goToStepDone }}\" style=\"display:inline-flex;align-items:center;gap:8px;margin-top:24px;background:oklch(48% 0.08 230);color:#fff;font-weight:700;font-size:14px;border-radius:10px;padding:12px 24px;cursor:pointer;min-height:44px;box-sizing:border-box\">Terminer →<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isStepDone }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"max-width:480px;margin:20px auto 0;text-align:center;background:#fff;border-radius:20px;padding:40px 32px;box-shadow:0 1px 3px rgba(60,40,20,.08)\">\n            <div style=\"font-weight:600;font-size:19px;margin-bottom:22px;font-family:'Source Serif 4',serif\">Merci d'avoir pris ce temps.<\u002Fdiv>\n            <div style=\"display:flex;gap:14px;justify-content:center;margin-bottom:8px\">\n              <div style=\"flex:1;max-width:180px;background:oklch(58% 0.09 145 / .12);border-radius:14px;padding:16px\">\n                <div style=\"font-size:12px;opacity:.6;font-weight:600;margin-bottom:6px\">Importance<\u002Fdiv>\n                <div style=\"font-family:'Source Serif 4',serif;font-weight:600;font-size:28px;color:oklch(38% 0.09 145)\">{{ importance }}<span style=\"font-size:15px;opacity:.5\">/10<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:1;max-width:180px;background:oklch(48% 0.08 230 / .1);border-radius:14px;padding:16px\">\n                <div style=\"font-size:12px;opacity:.6;font-weight:600;margin-bottom:6px\">Confiance<\u002Fdiv>\n                <div style=\"font-family:'Source Serif 4',serif;font-weight:600;font-size:28px;color:oklch(35% 0.08 230)\">{{ confidence }}<span style=\"font-size:15px;opacity:.5\">/10<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div role=\"button\" tabindex=\"0\" onclick=\"{{ restartMotivationSteps }}\" style=\"display:inline-flex;align-items:center;gap:8px;margin-top:22px;color:rgba(40,30,20,.55);font-weight:600;font-size:13px;cursor:pointer;min-height:44px\">↺ Revoir mes réponses<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isRaisonsTab }}\" hint-placeholder-val=\"{{ false }}\">\n        <div ref=\"{{ boardRef }}\" style=\"position:relative;background:#fff;border-radius:14px;box-shadow:0 1px 3px rgba(60,40,20,.08);min-height:260px;padding:20px\">\n          <sc-if value=\"{{ hasNoBoardCards }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;font-size:14px;opacity:.4;font-weight:600;padding:20px\">Faites glisser une raison depuis la réserve, ou ajoutez-en une nouvelle.<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-for list=\"{{ raisonsBoard }}\" as=\"card\" hint-placeholder-count=\"0\">\n            <div style=\"position:absolute;left:{{ card.xPct }};top:{{ card.yPct }};transform:translate(-50%,-50%);width:180px\">\n              <sc-if value=\"{{ card.isEditing }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"background:#fff;border-radius:10px;padding:12px;box-shadow:0 8px 20px rgba(58,51,44,.22);border:2px solid {{ card.color }}\">\n                  <input value=\"{{ card.label }}\" onchange=\"{{ card.onLabelChange }}\" style=\"width:100%;font-weight:800;font-size:13.5px;border:none;border-bottom:1px solid rgba(0,0,0,.1);margin-bottom:6px;padding:4px 0;font-family:'Work Sans',sans-serif;box-sizing:border-box\">\n                  <textarea value=\"{{ card.detail }}\" onchange=\"{{ card.onDetailChange }}\" placeholder=\"Précisez si besoin…\" rows=\"2\" style=\"width:100%;font-size:12.5px;border:1px solid rgba(0,0,0,.1);border-radius:6px;padding:6px;font-family:'Work Sans',sans-serif;resize:none;box-sizing:border-box\"><\u002Ftextarea>\n                  <div style=\"display:flex;justify-content:space-between;margin-top:8px\">\n                    <div role=\"button\" tabindex=\"0\" onclick=\"{{ card.onDelete }}\" style=\"font-size:12px;font-weight:700;color:oklch(55% 0.15 30);cursor:pointer;min-height:24px;display:flex;align-items:center\">Supprimer<\u002Fdiv>\n                    <div role=\"button\" tabindex=\"0\" onclick=\"{{ card.onCloseEdit }}\" style=\"font-size:12px;font-weight:700;color:oklch(48% 0.08 230);cursor:pointer;min-height:24px;display:flex;align-items:center\">OK<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ card.isNotEditing }}\" hint-placeholder-val=\"{{ true }}\">\n                <div onpointerdown=\"{{ card.onPointerDown }}\" style=\"background:{{ card.color }};color:#fff;border-radius:6px;padding:14px 12px;font-weight:800;font-size:13.5px;box-shadow:0 6px 14px rgba(58,51,44,.2);cursor:grab;line-height:1.3\">\n                  {{ card.label }}\n                  <sc-if value=\"{{ card.hasDetail }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"font-weight:500;font-size:11.5px;margin-top:5px;opacity:.9;line-height:1.35\">{{ card.detail }}<\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;opacity:.45;margin:16px 0 10px\">Réserve · cliquez pour ajouter au tableau<\u002Fdiv>\n        <div style=\"display:flex;gap:9px;flex-wrap:wrap\">\n          <sc-for list=\"{{ raisonsReserve }}\" as=\"r\" hint-placeholder-count=\"3\">\n            <div role=\"button\" tabindex=\"0\" onclick=\"{{ r.add }}\" style=\"background:#fff;border:2px dashed rgba(40,30,20,.25);border-radius:8px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;min-height:44px;display:flex;align-items:center;box-sizing:border-box\">{{ r.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n          <div role=\"button\" tabindex=\"0\" onclick=\"{{ addFreeCard }}\" style=\"background:oklch(48% 0.08 230);color:#fff;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:800;cursor:pointer;min-height:44px;display:flex;align-items:center;box-sizing:border-box\">+ une raison<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isSubstituts }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Module - Substituts et titration\" style=\"max-width:980px;margin:0 auto;padding:32px 40px 60px;position:relative\">\n\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:22px\">\n        <div role=\"button\" tabindex=\"0\" onclick=\"{{ goHome }}\" onkeydown=\"{{ goHomeKey }}\" style=\"display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:oklch(48% 0.08 230);cursor:pointer;min-height:44px;padding:6px 4px\">\n          <span style=\"font-size:16px\">←<\u002Fspan> Accueil\n        <\u002Fdiv>\n        <div role=\"button\" tabindex=\"0\" onclick=\"{{ toggleSources }}\" onkeydown=\"{{ toggleSourcesKey }}\" style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:rgba(40,30,20,.55);border:1.5px solid rgba(40,30,20,.18);border-radius:9px;padding:8px 14px;cursor:pointer;min-height:44px;box-sizing:border-box\">\n          <span style=\"width:15px;height:15px;border-radius:50%;border:1.5px solid currentColor;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800\">i<\u002Fspan> Sources\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ sourcesOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;top:70px;right:40px;width:300px;background:#fff;border-radius:12px;box-shadow:0 8px 28px rgba(40,30,20,.18);padding:18px 20px;z-index:5\">\n          <div style=\"font-weight:700;font-size:14px;margin-bottom:10px\">Sources<\u002Fdiv>\n          <div style=\"font-size:12.5px;line-height:1.6;opacity:.75\">Haute Autorité de Santé — Arrêt de la consommation de tabac (2014).<br>Tabac Info Service — 39 89.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"font-family:'Source Serif 4',serif;font-weight:600;font-size:26px;margin-bottom:6px\">Utilisation des substituts &amp; titration du patch<\u002Fdiv>\n      <div style=\"font-size:15px;opacity:.65;margin-bottom:22px;max-width:64ch\">Choisissez une forme pour ses bonnes pratiques. Pour la titration, aucun calcul de dose : on avance par quarts, selon le ressenti.<\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px\">\n        <sc-for list=\"{{ formes }}\" as=\"f\" hint-placeholder-count=\"7\">\n          <div role=\"button\" tabindex=\"0\" onclick=\"{{ f.select }}\" style=\"{{ f.style }}\">\n            <div style=\"width:30px;height:30px;border-radius:8px;background:{{ f.dotColor }};margin:0 auto 6px\"><\u002Fdiv>\n            <div style=\"font-size:11px;font-weight:700;line-height:1.2\">{{ f.label }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ selectedFormeHasContent }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;gap:14px;margin-bottom:26px\">\n          <div style=\"flex:1;background:oklch(58% 0.09 145 / .1);border-radius:12px;padding:16px 18px;border-left:5px solid oklch(58% 0.09 145)\">\n            <div style=\"font-weight:700;font-size:13.5px;margin-bottom:8px;color:oklch(38% 0.09 145)\">Bonnes pratiques — {{ selectedFormeLabel }}<\u002Fdiv>\n            <sc-for list=\"{{ selectedFormeBonnes }}\" as=\"b\" hint-placeholder-count=\"2\">\n              <div style=\"font-size:13px;line-height:1.6\">{{ b }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"flex:1;background:oklch(55% 0.15 30 / .1);border-radius:12px;padding:16px 18px;border-left:5px solid oklch(55% 0.15 30)\">\n            <div style=\"font-weight:700;font-size:13.5px;margin-bottom:8px;color:oklch(45% 0.15 30)\">Erreurs fréquentes<\u002Fdiv>\n            <sc-for list=\"{{ selectedFormeErreurs }}\" as=\"e\" hint-placeholder-count=\"2\">\n              <div style=\"font-size:13px;line-height:1.6\">{{ e }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ selectedFormeNoContent }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#fff;border-radius:12px;padding:16px 18px;margin-bottom:26px;border:1.5px dashed rgba(40,30,20,.2);font-size:13.5px;line-height:1.5;opacity:.75\">Fiche « {{ selectedFormeLabel }} » en cours de rédaction — à voir avec votre soignant.<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isPatchSelected }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(40,30,20,.45);margin-bottom:12px\">Méthode de titration du patch<\u002Fdiv>\n\n        <div style=\"background:#fff;border-radius:16px;padding:26px 28px;box-shadow:0 1px 3px rgba(60,40,20,.08)\">\n          <div style=\"display:flex;gap:10px;align-items:center;justify-content:center;margin-bottom:14px\">\n            <sc-for list=\"{{ patchSquares }}\" as=\"sq\" hint-placeholder-count=\"1\">\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;width:56px;height:56px;border-radius:10px;overflow:hidden;border:2px solid oklch(58% 0.09 145)\">\n                <sc-for list=\"{{ sq.cells }}\" as=\"c\" hint-placeholder-count=\"4\">\n                  <div style=\"background:{{ c.fill }}\"><\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"text-align:center;font-size:13.5px;font-weight:600;opacity:.55;margin-bottom:20px\">Expérimentez, fiez-vous à votre ressenti<\u002Fdiv>\n\n          <div style=\"display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:16px\">\n            <div role=\"button\" tabindex=\"0\" onclick=\"{{ toggleEnvie }}\" style=\"{{ envieButtonStyle }}\">L'envie de fumer persiste<\u002Fdiv>\n            <div role=\"button\" tabindex=\"0\" onclick=\"{{ toggleSurdosage }}\" style=\"{{ surdosageButtonStyle }}\">Signes de surdosage<\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ showEnvieSuggestion }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;justify-content:center\">\n              <div role=\"button\" tabindex=\"0\" onclick=\"{{ applyPlusQuarter }}\" style=\"display:inline-flex;align-items:center;background:oklch(58% 0.09 145);color:#fff;font-weight:700;font-size:14px;border-radius:10px;padding:12px 22px;cursor:pointer;min-height:44px;box-sizing:border-box\">+ ¼ de patch (tous les 3 jours)<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ showSurdosageSuggestion }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:oklch(55% 0.15 30);color:#fff;border-radius:12px;padding:16px 18px;margin-bottom:14px\">\n              <div style=\"font-weight:800;font-size:14px;margin-bottom:6px\">⚠ Signes de surdosage<\u002Fdiv>\n              <div style=\"font-size:13px;line-height:1.6;opacity:.95\">Nausées, écœurement, céphalées, palpitations, rêves intenses. Revenez au dosage précédent, et parlez-en à votre soignant.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:10px;justify-content:center;flex-wrap:wrap\">\n              <div role=\"button\" tabindex=\"0\" onclick=\"{{ revertToPrevious }}\" style=\"display:inline-flex;align-items:center;background:#fff;border:2px solid oklch(55% 0.15 30);color:oklch(45% 0.15 30);font-weight:700;font-size:14px;border-radius:10px;padding:11px 20px;cursor:pointer;min-height:44px;box-sizing:border-box\">Revenir à la dose précédente<\u002Fdiv>\n              <div role=\"button\" tabindex=\"0\" onclick=\"{{ applyMinusQuarter }}\" style=\"display:inline-flex;align-items:center;background:oklch(55% 0.15 30);color:#fff;font-weight:700;font-size:14px;border-radius:10px;padding:11px 20px;cursor:pointer;min-height:44px;box-sizing:border-box\">− ¼ de patch<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"display:flex;gap:14px;margin-top:22px;padding-top:18px;border-top:1px solid rgba(40,30,20,.08)\">\n            <div style=\"flex:1;background:oklch(65% 0.13 80 / .12);border-radius:12px;padding:14px 16px;font-size:13px;line-height:1.5\"><b style=\"display:block;margin-bottom:3px\">☀ Jour<\u002Fb>Dose habituelle, posée le matin.<\u002Fdiv>\n            <div style=\"flex:1;background:oklch(48% 0.08 230 / .1);border-radius:12px;padding:14px 16px;font-size:13px;line-height:1.5\"><b style=\"display:block;margin-bottom:3px\">☾ Nuit<\u002Fb>Dose allégée possible si troubles du sommeil.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ showTechniqueIllustration }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(40,30,20,.45);margin-bottom:12px\">Technique de prise — {{ selectedFormeLabel }}<\u002Fdiv>\n        <div style=\"background:#fff;border-radius:16px;padding:20px;box-shadow:0 1px 3px rgba(60,40,20,.08)\">\n          <div style=\"width:100%;aspect-ratio:16/7;border-radius:12px;background:repeating-linear-gradient(135deg, oklch(58% 0.09 145 / .12) 0 14px, oklch(58% 0.09 145 / .06) 14px 28px);display:flex;align-items:center;justify-content:center\">\n            <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:12.5px;font-weight:600;color:oklch(38% 0.09 145);background:rgba(255,255,255,.85);border-radius:8px;padding:8px 16px\">illustration · technique de prise « {{ selectedFormeLabel }} »<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isCraving }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Module - Gerer le craving\" style=\"max-width:980px;margin:0 auto;padding:32px 40px 60px;position:relative\">\n\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:22px\">\n        <div role=\"button\" tabindex=\"0\" onclick=\"{{ goHome }}\" onkeydown=\"{{ goHomeKey }}\" style=\"display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:oklch(48% 0.08 230);cursor:pointer;min-height:44px;padding:6px 4px\">\n          <span style=\"font-size:16px\">←<\u002Fspan> Accueil\n        <\u002Fdiv>\n        <div role=\"button\" tabindex=\"0\" onclick=\"{{ toggleSources }}\" onkeydown=\"{{ toggleSourcesKey }}\" style=\"display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:rgba(40,30,20,.55);border:1.5px solid rgba(40,30,20,.18);border-radius:9px;padding:8px 14px;cursor:pointer;min-height:44px;box-sizing:border-box\">\n          <span style=\"width:15px;height:15px;border-radius:50%;border:1.5px solid currentColor;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800\">i<\u002Fspan> Sources\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ sourcesOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;top:70px;right:40px;width:300px;background:#fff;border-radius:12px;box-shadow:0 8px 28px rgba(40,30,20,.18);padding:18px 20px;z-index:5\">\n          <div style=\"font-weight:700;font-size:14px;margin-bottom:10px\">Sources<\u002Fdiv>\n          <div style=\"font-size:12.5px;line-height:1.6;opacity:.75\">Haute Autorité de Santé — Arrêt de la consommation de tabac (2014).<br>Tabac Info Service — 39 89.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"font-family:'Source Serif 4',serif;font-weight:600;font-size:26px;margin-bottom:6px\">Gérer le craving<\u002Fdiv>\n      <div style=\"font-size:15px;opacity:.65;margin-bottom:22px;max-width:64ch\">L'envie de fumer est une vague : elle monte, puis redescend d'elle-même — même sans cigarette. Les 4D aident à tenir pendant ce temps.<\u002Fdiv>\n\n      <sc-if value=\"{{ cravingIsIdle }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"max-width:520px;margin:0 auto;background:#fff;border-radius:16px;padding:34px 30px;box-shadow:0 1px 3px rgba(60,40,20,.08);text-align:center\">\n          <div style=\"font-weight:600;font-size:16px;margin-bottom:16px\">Une envie arrive ?<\u002Fdiv>\n          <div role=\"button\" tabindex=\"0\" onclick=\"{{ startCravingTimer }}\" style=\"display:inline-flex;align-items:center;background:oklch(65% 0.13 80);color:#fff;font-weight:700;font-size:15px;border-radius:12px;padding:14px 28px;cursor:pointer;min-height:44px;box-sizing:border-box\">Je ressens un craving<\u002Fdiv>\n          <div style=\"font-size:12.5px;opacity:.5;font-weight:600;margin-top:14px\">Ça dure en général 3 à 5 minutes<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ cravingIsActive }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"max-width:640px;margin:0 auto\">\n          <div style=\"background:#fff;border-radius:16px;padding:22px 24px;box-shadow:0 1px 3px rgba(60,40,20,.08)\">\n            <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px\">\n              <div style=\"font-weight:700;font-size:15px\">La vague est en train de redescendre<\u002Fdiv>\n              <div style=\"font-family:'Source Serif 4',serif;font-weight:600;font-size:22px;color:oklch(65% 0.13 80)\">{{ cravingClock }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"{{ cravingStageStyle }}\">\n              <svg viewBox=\"0 0 580 130\" preserveAspectRatio=\"none\" style=\"display:block;width:100%;height:100%;position:absolute;inset:0\">\n                <path d=\"M10,110 C90,110 120,20 190,20 C280,20 300,95 400,100 C470,103 500,108 570,110\" fill=\"none\" stroke=\"rgba(40,30,20,.18)\" stroke-width=\"4\" stroke-linecap=\"round\" vector-effect=\"non-scaling-stroke\"><\u002Fpath>\n                <path d=\"{{ cravingWavePath }}\" fill=\"none\" stroke=\"oklch(65% 0.13 80)\" stroke-width=\"5\" stroke-linecap=\"round\" vector-effect=\"non-scaling-stroke\"><\u002Fpath>\n                <circle cx=\"{{ cravingDotX }}\" cy=\"{{ cravingDotY }}\" r=\"7\" fill=\"oklch(65% 0.13 80)\" vector-effect=\"non-scaling-stroke\"><\u002Fcircle>\n              <\u002Fsvg>\n              <sc-for list=\"{{ cravingCards }}\" as=\"card\" hint-placeholder-count=\"0\">\n                <div style=\"{{ card.wrapStyle }}\">\n                  <div style=\"font-weight:800;font-size:14.5px;margin-bottom:5px\">{{ card.title }}<\u002Fdiv>\n                  <div style=\"font-size:12.5px;line-height:1.5;opacity:.95\">{{ card.body }}<\u002Fdiv>\n                  <sc-if value=\"{{ card.isDetendre }}\" hint-placeholder-val=\"{{ false }}\">\n                    <svg width=\"120\" height=\"120\" viewBox=\"0 0 120 120\" style=\"margin:14px auto 6px;display:block\">\n                      <circle cx=\"60\" cy=\"60\" r=\"42\" fill=\"rgba(255,255,255,.18)\" stroke=\"rgba(255,255,255,.7)\" stroke-width=\"2.5\"><\u002Fcircle>\n                      <circle cx=\"60\" cy=\"60\" r=\"22\" fill=\"rgba(255,255,255,.95)\" style=\"animation:etp-breathe 10s ease-in-out infinite;transform-origin:60px 60px\"><\u002Fcircle>\n                    <\u002Fsvg>\n                    <div style=\"font-size:13px;font-weight:600;opacity:.9\">Inspirez 5s en le regardant grandir, expirez 5s<\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap\">\n              <div role=\"button\" tabindex=\"0\" onclick=\"{{ toggleDifferer }}\" style=\"{{ chipDiffererStyle }}\">{{ chipDiffererLabel }}<\u002Fdiv>\n              <div role=\"button\" tabindex=\"0\" onclick=\"{{ toggleDetourner }}\" style=\"{{ chipDetournerStyle }}\">{{ chipDetournerLabel }}<\u002Fdiv>\n              <div role=\"button\" tabindex=\"0\" onclick=\"{{ toggleDetendre }}\" style=\"{{ chipDetendreStyle }}\">{{ chipDetendreLabel }}<\u002Fdiv>\n              <div role=\"button\" tabindex=\"0\" onclick=\"{{ toggleEau }}\" style=\"{{ chipEauStyle }}\">{{ chipEauLabel }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:center;font-size:12px;opacity:.45;font-weight:600;margin-top:10px\">Touchez un D pour agir — il vient couvrir le pic de l'envie<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ cravingIsDone }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"max-width:480px;margin:0 auto;background:#fff;border-radius:16px;padding:36px 30px;box-shadow:0 1px 3px rgba(60,40,20,.08);text-align:center\">\n          <div style=\"font-family:'Source Serif 4',serif;font-weight:600;font-size:20px;margin-bottom:10px\">La vague est passée.<\u002Fdiv>\n          <div style=\"font-size:14px;opacity:.65;line-height:1.5;margin-bottom:24px\">Elle reviendra peut-être, un peu plus tard ou plus faible. À chaque fois, elle redescend.<\u002Fdiv>\n          <div role=\"button\" tabindex=\"0\" onclick=\"{{ resetCraving }}\" style=\"display:inline-flex;align-items:center;background:oklch(65% 0.13 80);color:#fff;font-weight:700;font-size:14px;border-radius:10px;padding:12px 22px;cursor:pointer;min-height:44px;box-sizing:border-box\">Recommencer<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst PILLARS = {\n  physique: {\n    label: 'Physique',\n    color: 'oklch(65% 0.13 80)',\n    colorSoft: 'oklch(65% 0.13 80 / .18)',\n    exemples: ['Manque', 'Irritabilité', 'Nervosité', 'Troubles de la concentration', 'Troubles du sommeil'],\n    outils: [\n      'Des substituts adaptés permettent de combler le manque sans fumer.',\n      'Comprendre la cinétique de la nicotine et les seuils aide à mieux anticiper.'\n    ]\n  },\n  psychologique: {\n    label: 'Psychologique',\n    color: 'oklch(48% 0.08 230)',\n    colorSoft: 'oklch(48% 0.08 230 / .16)',\n    exemples: ['Stress', 'Anxiété', 'Ennui', 'Plaisir et récompense', 'Stimulation'],\n    outils: [\n      'La gestion du stress et la respiration aident à apaiser sans fumer.',\n      \"Trouver d'autres sources de plaisir et s'occuper l'esprit.\"\n    ]\n  },\n  comportementale: {\n    label: 'Comportementale',\n    color: 'oklch(58% 0.09 145)',\n    colorSoft: 'oklch(58% 0.09 145 / .18)',\n    exemples: ['Café-clope', 'Après les repas', 'En pause', 'En voiture', 'En social'],\n    outils: [\n      'Repérer les automatismes et les associations pour les rompre progressivement.',\n      'Modifier les routines et les contextes favorables à la cigarette.'\n    ]\n  }\n};\n\nconst TIME_MAX = 24;\nconst GX0 = 20, GX1 = 620, GY_TOP = 20, GY_BOT = 220, LEVEL_MAX = 100;\n\nconst TYPE_INFO = {\n  cigarette: { label: 'C', color: 'oklch(55% 0.15 30)', colorSoft: 'oklch(55% 0.15 30 / .16)' },\n  patch: { label: 'P', color: 'oklch(58% 0.09 145)', colorSoft: 'oklch(58% 0.09 145 / .16)' },\n  substitut: { label: 'S', color: 'oklch(48% 0.08 230)', colorSoft: 'oklch(48% 0.08 230 / .16)' }\n};\n\nfunction timeToX(t) { return GX0 + (t / TIME_MAX) * (GX1 - GX0); }\nfunction levelToY(l) {\n  const clamped = Math.max(0, Math.min(LEVEL_MAX, l));\n  return GY_BOT - (clamped / LEVEL_MAX) * (GY_BOT - GY_TOP);\n}\n\nfunction cigaretteContribution(t, t0) {\n  const dt = t - t0;\n  if (dt < 0) return 0;\n  const rise = 1 - Math.exp(-dt / 0.04);\n  const decay = Math.exp(-dt * Math.LN2 / 1.2);\n  return 40 * rise * decay;\n}\nfunction patchContribution(t, t0, dose) {\n  const dt = t - t0;\n  if (dt < 0) return 0;\n  const amp = 30 * dose;\n  if (dt < 0.5) return amp * (dt / 0.5);\n  return amp;\n}\nfunction substitutContribution(t, t0) {\n  const dt = t - t0;\n  if (dt < 0) return 0;\n  const rise = 1 - Math.exp(-dt / 0.35);\n  const decay = Math.exp(-dt * Math.LN2 / 2.2);\n  return 26 * rise * decay;\n}\nfunction contributionFor(type, t, t0, dose) {\n  if (type === 'cigarette') return cigaretteContribution(t, t0);\n  if (type === 'patch') return patchContribution(t, t0, dose);\n  if (type === 'substitut') return substitutContribution(t, t0);\n  return 0;\n}\nfunction buildCurvePath(events) {\n  const steps = 200;\n  let d = '';\n  for (let i = 0; i <= steps; i++) {\n    const t = (i / steps) * TIME_MAX;\n    let level = 4;\n    for (const ev of events) level += contributionFor(ev.type, t, ev.time, ev.dose);\n    const x = timeToX(t);\n    const y = levelToY(level);\n    d += (i === 0 ? 'M' : ' L') + x.toFixed(1) + ',' + y.toFixed(1);\n  }\n  return d;\n}\nfunction formatDose(dose) {\n  const n = Math.round(dose * 4);\n  if (n % 4 === 0) return '×' + (n / 4);\n  return '×' + (n / 4).toFixed(2).replace(/0$/, '');\n}\nfunction formatTime(t) {\n  const h = Math.floor(t);\n  const m = Math.round((t - h) * 60);\n  return h + 'h' + (m ? String(m).padStart(2, '0') : '');\n}\nfunction toolBtnStyle(active, color, colorSoft) {\n  return active\n    ? `display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;border:2px solid ${color};background:${colorSoft};font-weight:700;font-size:14px;cursor:pointer;min-height:44px;box-sizing:border-box`\n    : `display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;border:2px solid transparent;background:#fff;color:rgba(40,30,20,.6);font-weight:700;font-size:14px;cursor:pointer;min-height:44px;box-sizing:border-box;box-shadow:0 1px 3px rgba(60,40,20,.08)`;\n}\n\nconst SUBSTANCES_TOXIQUE = [\n  { key: 'goudrons', label: 'Goudrons', icon: '⚠️', type: 'malade', x: 100, side: 'above', detail: \"Se déposent dans les poumons — la principale cause des cancers liés au tabac. Absents des substituts et de la vapoteuse.\" },\n  { key: 'co', label: 'Monoxyde de carbone', icon: '⚠️', type: 'malade', x: 185, side: 'below', detail: \"Réduit l’oxygénation du sang et fatigue le cœur. Disparait sans combustion.\" },\n  { key: 'particules', label: 'Particules fines', icon: '⚠️', type: 'malade', x: 270, side: 'above', detail: \"Irritent les voies respiratoires et pénètrent profondément dans les poumons.\" },\n  { key: 'nicotine', label: 'Nicotine', icon: '🧠', type: 'dependance', x: 355, side: 'below', detail: \"Agit en quelques secondes sur le cerveau, entretient l’envie. Pas anodine — mais absente des maladies liées au tabac. Les substituts la délivrent sans combustion.\" }\n];\nfunction viewBtnStyle(active, color, colorSoft) {\n  return active\n    ? `background:${color};color:#fff;font-weight:800;font-size:13px;border-radius:999px;padding:9px 18px;cursor:pointer;min-height:44px;box-sizing:border-box;display:flex;align-items:center`\n    : `background:#fff;color:rgba(40,30,20,.55);font-weight:800;font-size:13px;border-radius:999px;padding:9px 18px;cursor:pointer;min-height:44px;box-sizing:border-box;box-shadow:0 1px 3px rgba(60,40,20,.08);display:flex;align-items:center`;\n}\n\nconst FORMES = [\n  { key: 'patch', label: 'Patch', hasContent: true,\n    bonnes: ['Coller sur peau propre, sèche, sans poils.', \"Changer de zone chaque jour, poser le matin à heure régulière.\"],\n    erreurs: ['Recoller sur la même zone.', 'Le garder sur une peau irritée ou l\\u2019oublier plusieurs jours.'] },\n  { key: 'gomme', label: 'Gomme', hasContent: true,\n    bonnes: ['Mâcher lentement jusqu\\u2019à sentir un picotement, puis laisser au repos contre la joue.', 'Répéter ce cycle pendant 20 à 30 minutes.'],\n    erreurs: ['Mâcher en continu comme un chewing-gum classique.', 'Boire un café ou un soda juste avant : réduit l\\u2019absorption.'] },\n  { key: 'pastille', label: 'Pastille', hasContent: true,\n    bonnes: ['Laisser fondre lentement en bouche, sans croquer.', 'Déplacer d\\u2019un côté à l\\u2019autre de la bouche.'],\n    erreurs: ['La croquer ou l\\u2019avaler rapidement.', 'Enchaîner les pastilles sans respecter le délai conseillé.'] },\n  { key: 'comprime', label: 'Comprimé sublingual', hasContent: true,\n    bonnes: ['Placer sous la langue, laisser se dissoudre sans avaler.', 'Éviter de manger ou boire pendant l\\u2019absorption.'],\n    erreurs: ['Le croquer ou l\\u2019avaler comme un comprimé classique.'] },\n  { key: 'spray', label: 'Spray buccal', hasContent: true,\n    bonnes: ['Pulvériser directement dans la bouche, éviter d\\u2019inhaler.', 'Utiliser dès les premiers signes d\\u2019envie.'],\n    erreurs: ['Pulvériser vers la gorge ou inhaler la vapeur.'] },\n  { key: 'inhaleur', label: 'Inhaleur', hasContent: false, bonnes: [], erreurs: [] },\n  { key: 'vapoteuse', label: 'Vapoteuse', hasContent: false, bonnes: [], erreurs: [] }\n];\n\nconst QUARTER_CELL_ORDER = [[0,0],[1,0],[0,1],[1,1]];\n\nfunction buildPatchSquares(quarters) {\n  const totalSquares = Math.max(1, Math.ceil(quarters / 4));\n  const squares = [];\n  for (let s = 0; s < totalSquares; s++) {\n    const cells = [];\n    for (let i = 0; i < 4; i++) {\n      const idx = s * 4 + i;\n      const filled = idx < quarters;\n      cells.push({ key: s + '-' + i, fill: filled ? 'oklch(58% 0.09 145)' : '#ffffff' });\n    }\n    squares.push({ key: 's' + s, cells });\n  }\n  return squares;\n}\n\nconst TENSION_LEVEL_HIGH = 90, TENSION_LEVEL_TROUGH = 15, TENSION_NONSMOKER_LEVEL = 4;\nconst TENSION_Y_HIGH = 40, TENSION_Y_LOW_REF = 170;\nconst TENSION_TAU = 2.2;\nconst TENSION_VIRTUAL_START = -2.5;\n\nfunction tensionToY(level) {\n  return TENSION_Y_LOW_REF + (level - TENSION_LEVEL_TROUGH) / (TENSION_LEVEL_HIGH - TENSION_LEVEL_TROUGH) * (TENSION_Y_HIGH - TENSION_Y_LOW_REF);\n}\nfunction tensionLevelAt(t, times) {\n  let lastT = TENSION_VIRTUAL_START;\n  for (const et of times) { if (et <= t && et > lastT) lastT = et; }\n  const dt = t - lastT;\n  return TENSION_LEVEL_HIGH - (TENSION_LEVEL_HIGH - TENSION_LEVEL_TROUGH) * Math.exp(-dt / TENSION_TAU);\n}\nfunction buildTensionCurvePath(times) {\n  const sorted = [...times].sort((a, b) => a - b);\n  const steps = 200;\n  let d = '';\n  for (let i = 0; i <= steps; i++) {\n    const t = (i / steps) * TIME_MAX;\n    const level = tensionLevelAt(t, sorted);\n    const x = timeToX(t);\n    const y = tensionToY(level);\n    d += (i === 0 ? 'M' : ' L') + x.toFixed(1) + ',' + y.toFixed(1);\n  }\n  return d;\n}\n\nconst CRAVING_DURATION = 180;\nconst CRAVING_D_INFO = {\n  differer: { title: 'Différer', body: \"Attendez encore un peu — l'envie ne fait que monter avant de redescendre.\", color: 'oklch(65% 0.13 80)', colorSoft: 'oklch(65% 0.13 80 / .14)' },\n  detourner: { title: \"Détourner l'attention\", body: 'Occupez vos mains ou votre tête quelques minutes : marchez un peu, appelez quelqu\\u2019un.', color: 'oklch(48% 0.08 230)', colorSoft: 'oklch(48% 0.08 230 / .14)' },\n  detendre: { title: 'Se détendre — respirez', body: 'Suivez le cercle : inspirez en le regardant grandir, expirez quand il se resserre.', color: 'oklch(58% 0.09 145)', colorSoft: 'oklch(58% 0.09 145 / .14)' },\n  eau: { title: \"D'eau\", body: 'Buvez un verre d\\u2019eau, lentement, en petites gorgées.', color: 'oklch(55% 0.10 200)', colorSoft: 'oklch(55% 0.10 200 / .14)' }\n};\nconst CRAVING_WAVE_SEGMENTS = [\n  { p0: { x: 10, y: 110 }, c1: { x: 90, y: 110 }, c2: { x: 120, y: 20 }, p1: { x: 190, y: 20 } },\n  { p0: { x: 190, y: 20 }, c1: { x: 280, y: 20 }, c2: { x: 300, y: 95 }, p1: { x: 400, y: 100 } },\n  { p0: { x: 400, y: 100 }, c1: { x: 470, y: 103 }, c2: { x: 500, y: 108 }, p1: { x: 570, y: 110 } }\n];\nfunction cravingCubicPoint(seg, t) {\n  const mt = 1 - t;\n  const x = mt * mt * mt * seg.p0.x + 3 * mt * mt * t * seg.c1.x + 3 * mt * t * t * seg.c2.x + t * t * t * seg.p1.x;\n  const y = mt * mt * mt * seg.p0.y + 3 * mt * mt * t * seg.c1.y + 3 * mt * t * t * seg.c2.y + t * t * t * seg.p1.y;\n  return { x, y };\n}\nfunction cravingWavePoint(progress) {\n  const p = Math.max(0, Math.min(1, progress));\n  const scaled = p * CRAVING_WAVE_SEGMENTS.length;\n  let idx = Math.floor(scaled);\n  if (idx >= CRAVING_WAVE_SEGMENTS.length) idx = CRAVING_WAVE_SEGMENTS.length - 1;\n  const localT = Math.min(1, scaled - idx);\n  return cravingCubicPoint(CRAVING_WAVE_SEGMENTS[idx], localT);\n}\nfunction cravingWavePathUpTo(progress) {\n  const steps = 40;\n  let d = '';\n  const count = Math.max(1, Math.round(steps * Math.max(0.02, progress)));\n  for (let i = 0; i <= count; i++) {\n    const p = (i / count) * progress;\n    const pt = cravingWavePoint(p);\n    d += (i === 0 ? 'M' : ' L') + pt.x.toFixed(1) + ',' + pt.y.toFixed(1);\n  }\n  return d;\n}\nfunction formatClock(seconds) {\n  const m = Math.floor(seconds / 60);\n  const s = seconds % 60;\n  return m + ':' + String(s).padStart(2, '0');\n}\n\nconst MOTIVATION_COLORS = ['oklch(55% 0.15 30)', 'oklch(58% 0.09 145)', 'oklch(62% 0.13 80)', 'oklch(48% 0.08 230)'];\nconst MOTIVATION_SEED = [\n  { label: 'Ma santé' },\n  { label: 'Mes proches' },\n  { label: 'Le budget' },\n  { label: 'Le goût / l\\u2019odorat' },\n  { label: 'Mon souffle / ma forme' },\n  { label: 'Ma liberté' }\n];\n\nclass Component extends DCLogic {\n  state = {\n    screen: 'home',\n    selected: null,\n    tab: 'quoi',\n    sourcesOpen: false,\n    tool: 'cigarette',\n    events: [],\n    nextId: 1,\n    motivationTab: 'etat',\n    motivationStep: 0,\n    importance: 5,\n    confidence: 5,\n    importanceTouched: false,\n    confidenceTouched: false,\n    raisonsBoard: [],\n    raisonsReserve: MOTIVATION_SEED.map((s, i) => ({ id: i + 1, label: s.label })),\n    nextRaisonId: 7,\n    editingCardId: null,\n    selectedForme: 'patch',\n    doseQuarters: 3,\n    previousDoseQuarters: 3,\n    symptom: null,\n    cravingPhase: 'idle',\n    cravingTime: CRAVING_DURATION,\n    cravingDs: [],\n    toxiqueView: null,\n    openHotspot: null,\n    soulagementEvents: [],\n    soulagementNextId: 1,\n    showNonSmoker: false\n  };\n  svgRef = React.createRef();\n  soulagementSvgRef = React.createRef();\n  importanceRef = React.createRef();\n  confidenceRef = React.createRef();\n  boardRef = React.createRef();\n\n  goToNicotine = () => this.setState({ screen: 'nicotine', sourcesOpen: false });\n  goToNicotineKey = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); this.goToNicotine(); } };\n\n  goToToxique = () => this.setState({ screen: 'toxique', sourcesOpen: false, toxiqueView: null, openHotspot: null });\n  goToToxiqueKey = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); this.goToToxique(); } };\n  setViewMalade = () => this.setState(s => ({ toxiqueView: s.toxiqueView === 'malade' ? null : 'malade', openHotspot: null }));\n  setViewDependance = () => this.setState(s => ({ toxiqueView: s.toxiqueView === 'dependance' ? null : 'dependance', openHotspot: null }));\n  toggleHotspot = (key) => this.setState(s => ({ openHotspot: s.openHotspot === key ? null : key }));\n\n  goToSoulagement = () => this.setState({ screen: 'soulagement', sourcesOpen: false });\n  goToSoulagementKey = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); this.goToSoulagement(); } };\n  toggleNonSmoker = () => this.setState(s => ({ showNonSmoker: !s.showNonSmoker }));\n  addSoulagementEventAtClick = (e) => {\n    const svgEl = this.soulagementSvgRef.current;\n    if (!svgEl) return;\n    const rect = svgEl.getBoundingClientRect();\n    const scaleX = 640 / rect.width;\n    const vx = (e.clientX - rect.left) * scaleX;\n    let t = ((vx - GX0) / (GX1 - GX0)) * TIME_MAX;\n    t = Math.max(0, Math.min(TIME_MAX, t));\n    t = Math.round(t * 4) / 4;\n    const id = this.state.soulagementNextId;\n    this.setState(s => ({ soulagementEvents: [...s.soulagementEvents, { id, time: t }], soulagementNextId: id + 1 }));\n  };\n  removeSoulagementEvent = (id) => this.setState(s => ({ soulagementEvents: s.soulagementEvents.filter(ev => ev.id !== id) }));\n  clearSoulagementEvents = () => this.setState({ soulagementEvents: [], showNonSmoker: false });\n\n  goToMotivation = () => this.setState({ screen: 'motivation', sourcesOpen: false });\n  goToMotivationKey = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); this.goToMotivation(); } };\n\n  goToSubstituts = () => this.setState({ screen: 'substituts', sourcesOpen: false });\n  goToSubstitutsKey = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); this.goToSubstituts(); } };\n  selectForme = (key) => this.setState({ selectedForme: key });\n\n  toggleEnvie = () => this.setState(s => ({ symptom: s.symptom === 'envie' ? null : 'envie' }));\n  toggleSurdosage = () => this.setState(s => ({ symptom: s.symptom === 'surdosage' ? null : 'surdosage' }));\n  applyPlusQuarter = () => this.setState(s => ({ previousDoseQuarters: s.doseQuarters, doseQuarters: Math.min(8, s.doseQuarters + 1), symptom: null }));\n  applyMinusQuarter = () => this.setState(s => ({ previousDoseQuarters: s.doseQuarters, doseQuarters: Math.max(1, s.doseQuarters - 1), symptom: null }));\n  revertToPrevious = () => this.setState(s => ({ doseQuarters: s.previousDoseQuarters, symptom: null }));\n\n  setTabEtat = () => this.setState({ motivationTab: 'etat' });\n  setTabRaisons = () => this.setState({ motivationTab: 'raisons' });\n\n  goToStepConfidence = () => this.setState({ motivationStep: 1 });\n  goToStepDone = () => this.setState({ motivation
