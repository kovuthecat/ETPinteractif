<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta name="viewport" content="width=1920">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{ box-sizing: border-box; }
    body{ margin:0; }
    @keyframes tabGlow {
      0%, 100% { box-shadow: -4px 0 18px rgba(0,0,0,0.06), 0 0 0 0 rgba(201,162,39,0.30); }
      50% { box-shadow: -4px 0 18px rgba(0,0,0,0.06), 0 0 0 16px rgba(201,162,39,0); }
    }
  </style>
</helmet>
<div style="width:100%;height:100vh;display:flex;align-items:center;justify-content:center;background:#F7F3EC;overflow:hidden;">
<div data-screen-label="Module 1" style="width:1920px;height:1080px;background:#F7F3EC;font-family:'Public Sans',sans-serif;color:#26221B;position:relative;overflow:hidden;display:flex;flex-direction:column;flex-shrink:0;transform:scale({{ scale }});">

  <div style="display:flex;justify-content:space-between;align-items:center;padding:48px 72px 0;">
    <div style="font-size:18px;letter-spacing:0.12em;color:#8B8478;font-weight:600;">MODULE 1 · C'EST QUOI LE DIABÈTE ?</div>
    <div style="display:flex;gap:14px;">
      <sc-for list="{{ dots }}" as="dot" hint-placeholder-count="4">
        <div style="width:14px;height:14px;border-radius:50%;background:{{ dot.bg }};border:2px solid {{ dot.border }};"></div>
      </sc-for>
    </div>
  </div>

  <div style="flex:1;display:flex;align-items:center;justify-content:center;gap:64px;padding:0 140px;min-height:0;">

    <div style="width:200px;display:flex;flex-direction:column;align-items:center;gap:18px;flex-shrink:0;">
      <div style="width:170px;height:126px;border-radius:50%;background:#E7D9BE;box-shadow:inset 0 -10px 20px rgba(0,0,0,0.05);opacity:{{ pancreasOpacity }};filter:{{ pancreasFilter }};"></div>
      <div style="font-size:19px;letter-spacing:0.06em;text-transform:uppercase;color:#8B8478;">Pancréas</div>
    </div>

    <div style="font-size:40px;color:#C7C0B2;flex-shrink:0;">›</div>

    <div style="flex:1;max-width:1180px;display:flex;flex-direction:column;align-items:center;gap:22px;">

      <div style="display:flex;gap:46px;justify-content:center;align-items:flex-start;">
        <sc-for list="{{ cells }}" as="cell" hint-placeholder-count="5">
          <div style="display:flex;flex-direction:column;align-items:center;">
            <div style="width:136px;height:176px;border-radius:58% 58% 46% 46% / 64% 64% 40% 40%;background:#FEFCF9;border:4px solid {{ cell.ring }};position:relative;display:flex;align-items:center;justify-content:center;">

              <div style="position:absolute;top:-18px;left:50%;transform:translateX(-50%);">
                <sc-if value="{{ cell.keyShown }}">
                  <div style="position:absolute;left:50%;top:-30px;transform:translate(-50%, {{ cell.keyTranslate }});opacity:{{ cell.keyOpacity }};display:flex;flex-direction:column;align-items:center;">
                    <div style="width:18px;height:18px;border-radius:50%;border:5px solid #26221B;"></div>
                    <div style="width:6px;height:20px;background:#26221B;margin-top:-3px;"></div>
                  </div>
                </sc-if>
                <svg width="30" height="34" viewBox="0 0 24 28">
                  <path d="{{ cell.shackleD }}" fill="none" stroke="{{ cell.lockStroke }}" stroke-width="2.6" stroke-linecap="round"></path>
                  <rect x="4" y="12" width="16" height="13" rx="3" fill="{{ cell.lockFill }}" stroke="{{ cell.lockStroke }}" stroke-width="2"></rect>
                  <sc-if value="{{ cell.rusted }}">
                    <line x1="7" y1="15" x2="10" y2="22" stroke="{{ cell.markColor }}" stroke-width="1.6"></line>
                    <line x1="14" y1="15" x2="17" y2="22" stroke="{{ cell.markColor }}" stroke-width="1.6"></line>
                  </sc-if>
                  <sc-if value="{{ cell.showKeyhole }}">
                    <circle cx="12" cy="18.5" r="1.8" fill="{{ cell.markColor }}"></circle>
                  </sc-if>
                </svg>
              </div>

              <sc-if value="{{ cell.open }}">
                <div style="display:flex;gap:10px;">
                  <svg width="22" height="22" viewBox="0 0 26 26">
                    <polygon points="13,2 24,8 13,14 2,8" fill="#FFFFFF" stroke="#3F8F5C" stroke-width="1.2"></polygon>
                    <polygon points="2,8 13,14 13,24 2,18" fill="#EDE7DA" stroke="#3F8F5C" stroke-width="1.2"></polygon>
                    <polygon points="24,8 13,14 13,24 24,18" fill="#DED5C2" stroke="#3F8F5C" stroke-width="1.2"></polygon>
                  </svg>
                  <svg width="22" height="22" viewBox="0 0 26 26">
                    <polygon points="13,2 24,8 13,14 2,8" fill="#FFFFFF" stroke="#3F8F5C" stroke-width="1.2"></polygon>
                    <polygon points="2,8 13,14 13,24 2,18" fill="#EDE7DA" stroke="#3F8F5C" stroke-width="1.2"></polygon>
                    <polygon points="24,8 13,14 13,24 24,18" fill="#DED5C2" stroke="#3F8F5C" stroke-width="1.2"></polygon>
                  </svg>
                </div>
              </sc-if>
            </div>
            <div style="width:5px;height:26px;background:#C98E86;"></div>
          </div>
        </sc-for>
      </div>

      <div style="width:100%;border-radius:64px;background:linear-gradient(180deg, #ECC3B9, #D9A196);padding:13px;box-shadow:inset 0 2px 5px rgba(255,255,255,0.5), 0 8px 20px rgba(120,50,45,0.12);">
        <div style="border-radius:52px;background:{{ vesselTone }};min-height:96px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:14px;padding:18px 40px;box-shadow:inset 0 8px 16px rgba(0,0,0,0.28), inset 0 -6px 12px rgba(0,0,0,0.18), inset 0 0 0 2px rgba(0,0,0,0.08);">
          <sc-for list="{{ tokens }}" as="token" hint-placeholder-count="6">
            <svg width="26" height="26" viewBox="0 0 26 26" style="opacity:{{ token.opacity }};filter:drop-shadow(0 2px 2px rgba(0,0,0,0.25));">
              <polygon points="13,2 24,8 13,14 2,8" fill="#FFFFFF" stroke="#C9A227" stroke-width="1.2"></polygon>
              <polygon points="2,8 13,14 13,24 2,18" fill="#EDE7DA" stroke="#C9A227" stroke-width="1.2"></polygon>
              <polygon points="24,8 13,14 13,24 24,18" fill="#DED5C2" stroke="#C9A227" stroke-width="1.2"></polygon>
            </svg>
          </sc-for>
        </div>
      </div>

    </div>
  </div>

  <div style="padding:0 220px 64px;text-align:center;">
    <div style="font-size:22px;letter-spacing:0.08em;text-transform:uppercase;color:#8B8478;margin-bottom:18px;">{{ caption.eyebrow }}</div>
    <div style="font-size:46px;line-height:1.35;font-weight:500;max-width:1360px;margin:0 auto;">{{ caption.text }}</div>
  </div>

  <sc-if value="{{ showBackButton }}">
    <div onclick="{{ prev }}" style="position:absolute;left:72px;bottom:78px;font-size:32px;color:#B9B2A4;cursor:pointer;user-select:none;">‹</div>
  </sc-if>

  <sc-if value="{{ showNext }}">
    <div onclick="{{ next }}" style="position:absolute;right:72px;bottom:56px;width:76px;height:76px;border-radius:50%;background:#26221B;color:#F7F3EC;font-size:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;">›</div>
  </sc-if>

  <sc-if value="{{ showRestart }}">
    <div onclick="{{ restart }}" style="position:absolute;right:72px;bottom:66px;font-size:19px;letter-spacing:0.04em;color:#8B8478;cursor:pointer;user-select:none;">Recommencer</div>
  </sc-if>

  <sc-if value="{{ showTransition }}">
    <div style="position:absolute;right:0;top:50%;transform:translateY(-50%);background:#FFFFFF;border:2px solid #C9A227;border-right:none;border-radius:20px 0 0 20px;padding:22px 30px 22px 22px;display:flex;align-items:center;gap:16px;animation:tabGlow 2.6s ease-in-out infinite;">
      <div style="width:36px;height:36px;border-radius:50%;background:#F1E7D8;border:2px solid #C9A227;flex-shrink:0;"></div>
      <div style="font-size:22px;font-weight:600;white-space:nowrap;">Alimentation ›</div>
    </div>
  </sc-if>

</div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 1920, &quot;height&quot;: 1080},
  &quot;autoAdvance&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Comportement&quot;},
  &quot;showBackButton&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Comportement&quot;},
  &quot;vesselTone&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#8E332C&quot;, &quot;options&quot;: [&quot;#8E332C&quot;, &quot;#A8433C&quot;, &quot;#7A2C27&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Apparence&quot;}
}">
class Component extends DCLogic {
  state = { temps: 1, scale: 1 };

  componentDidMount() {
    if (this.props.autoAdvance) this.startAuto();
    this.updateScale();
    this._onResize = () => this.updateScale();
    window.addEventListener('resize', this._onResize);
  }

  updateScale() {
    const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    this.setState({ scale: s > 0 ? s : 1 });
  }

  componentDidUpdate(prevProps) {
    if (prevProps.autoAdvance !== this.props.autoAdvance) {
      if (this.props.autoAdvance) this.startAuto();
      else this.stopAuto();
    }
  }

  componentWillUnmount() {
    this.stopAuto();
    if (this._onResize) window.removeEventListener('resize', this._onResize);
  }

  startAuto() {
    this.stopAuto();
    this._timer = setInterval(() => {
      this.setState(s => ({ temps: s.temps >= 4 ? 1 : s.temps + 1 }));
    }, 4200);
  }

  stopAuto() {
    if (this._timer) { clearInterval(this._timer); this._timer = null; }
  }

  next = () => this.setState(s => ({ temps: Math.min(4, s.temps + 1) }));
  prev = () => this.setState(s => ({ temps: Math.max(1, s.temps - 1) }));
  restart = () => this.setState({ temps: 1 });

  getRawCells(temps) {
    if (temps === 1) {
      return [0, 1, 2, 3, 4].map(i => ({ id: i, open: true, hasKey: true, rusted: false }));
    }
    if (temps === 2) {
      return [0, 1, 2, 3, 4].map(i => ({ id: i, open: i === 0, hasKey: i === 0, rusted: false }));
    }
    if (temps === 3) {
      return [0, 1, 2, 3, 4].map(i => ({ id: i, open: false, hasKey: true, rusted: true }));
    }
    return [0, 1, 2, 3, 4].map(i => {
      if (i < 2) return { id: i, open: false, hasKey: false, rusted: false };
      if (i < 4) return { id: i, open: false, hasKey: true, rusted: true };
      return { id: i, open: true, hasKey: true, rusted: false };
    });
  }

  styleCell(cell) {
    const SHACKLE_FLUSH = 'M7 12 V8 A5 5 0 0 1 17 8 V12';
    const SHACKLE_RAISED = 'M7 9 V6 A5 5 0 0 1 17 6 V9';
    if (cell.open) {
      return Object.assign({}, cell, {
        ring: '#3F8F5C',
        shackleD: SHACKLE_RAISED,
        lockFill: '#EAF4EE',
        lockStroke: '#3F8F5C',
        markColor: '#3F8F5C',
        showKeyhole: false,
        keyShown: true,
        keyOpacity: 1,
        keyTranslate: '4px'
      });
    }
    if (cell.rusted) {
      return Object.assign({}, cell, {
        ring: '#A9823A',
        shackleD: SHACKLE_FLUSH,
        lockFill: '#E9D9AE',
        lockStroke: '#A9823A',
        markColor: '#8A6A2E',
        showKeyhole: false,
        keyShown: true,
        keyOpacity: 0.9,
        keyTranslate: '-32px'
      });
    }
    return Object.assign({}, cell, {
      ring: '#D8D2C4',
      shackleD: SHACKLE_FLUSH,
      lockFill: '#FFFFFF',
      lockStroke: '#C7C0B2',
      markColor: '#C7C0B2',
      showKeyhole: true,
      keyShown: cell.hasKey,
      keyOpacity: 0.9,
      keyTranslate: '-32px'
    });
  }

  getCaption(temps) {
    const map = {
      1: { eyebrow: '1 · Chez une personne sans diabète', text: "L\u2019insuline (les clés) ouvre les cellules : le sucre entre, le sang se vide." },
      2: { eyebrow: '2 · Pas assez de clés', text: "Le pancréas fatigué fabrique moins de clés : le sucre reste dans le sang." },
      3: { eyebrow: '3 · Les serrures résistent', text: "Les clés sont là, mais les serrures résistent : le sucre reste aussi dans le sang." },
      4: { eyebrow: '4 · Souvent, un peu des deux', text: "Bien manger et bouger aident la clé et soulagent le pancréas." }
    };
    return map[temps];
  }

  renderVals() {
    const temps = this.state.temps;
    const rawCells = this.getRawCells(temps);
    const cells = rawCells.map(c => this.styleCell(c));
    const closedCount = cells.filter(c => !c.open).length;
    const tokenCount = temps === 1 ? 3 : Math.max(2, closedCount * 2 + 1);
    const baseOpacity = temps === 1 ? [0.85, 0.5, 0.22] : null;
    const tokens = Array.from({ length: tokenCount }).map((_, i) => ({
      id: i,
      opacity: baseOpacity ? (baseOpacity[i] ?? 0.18) : 0.92
    }));
    const caption = this.getCaption(temps);
    const dots = [1, 2, 3, 4].map(n => {
      const filled = n <= temps;
      return { id: n, bg: filled ? '#26221B' : 'transparent', border: filled ? '#26221B' : '#C7C0B2' };
    });
    const pancreasDim = temps === 2 || temps === 4;

    return {
      scale: this.state.scale,
      cells,
      tokens,
      caption,
      dots,
      pancreasOpacity: pancreasDim ? 0.5 : 1,
      pancreasFilter: pancreasDim ? 'grayscale(0.5)' : 'none',
      vesselTone: this.props.vesselTone ?? '#E7DCD3',
      showBackButton: (this.props.showBackButton ?? true) && temps > 1,
      showNext: temps < 4,
      showRestart: temps === 4,
      showTransition: temps === 4,
      next: this.next,
      prev: this.prev,
      restart: this.restart
    };
  }
}
</script>
</body>
</html>
